<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Screenshot</title>

<style>
body, html {
    height: 100%;
    margin: 0;
}

.background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 1;
}

.container {
    position: relative;
    z-index: 2;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.input-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input[type="text"] {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
}

input[type="button"] {
    padding: 10px 20px;
}
</style>
</head>

<body>

<div class="background" id="background"></div>

<div class="container">
    <div class="input-container">
        <h1>Insert Screenshot Background</h1>
        <input type="text" id="urlInput" placeholder="Enter the screenshot URL here">
        <input type="button" value="Set Background" onclick="setBackground()">
    </div>
</div>

<script>

const DEFAULT_BACKGROUND = "https://i.imgur.com/Yf7tOKh.jpeg";

function setBackground(url=null) {

    if(!url){
        url = document.getElementById('urlInput').value;
    }

    if(url){
        document.getElementById('background').style.backgroundImage = "url(" + url + ")";
        document.querySelector('.input-container').style.visibility = "hidden";
    }
}

window.onload = function(){
    setBackground(DEFAULT_BACKGROUND);
}

</script>

<div id="web-chat-root-id"></div>
<script crossorigin="anonymous" src="https://live-chat.spitch-dev.ai/webchat/index.js"></script>
<script>
    /*
     * USAGE NOTES:
     * - populate userId only for authorized users
     * - populate userData to skip the 'welcome' dialog (as shown below)
     */
    window.addEventListener('load', () => {
        if (typeof window.web_chat_init !== 'function') {
            console.log('WebChat is not initialized');
            return;
        }

        window.web_chat_init({
            rootId: 'web-chat-root-id',
            endpoint: 'wss://live-chat.spitch-dev.ai/webhooks/website/69b431089180aab3a88662a7',
            adapterId: '69b431089180aab3a88662a7',
            // userId is automatically generated if empty
            userId: "",
            // remove userData to enable the 'welcome form' 
            userData: {
                username: "anonymous",
                firstName: "anonymous", 
                lastName: "anonymous", 
            },
            /* enable the polling mode if the endpoint is not available via websockets */
            pollingMode: false,
            pollingTimeout: 30000
        });
    });
</script>

</body>
</html>
